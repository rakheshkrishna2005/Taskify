# Production Configuration (for Render/Cloud deployment)
# This file is used when running with: --spring.profiles.active=prod

# PostgreSQL Database Configuration (Use environment variables in production)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Server Configuration
server.port=${PORT:8080}

# Logging (Less verbose in production)
logging.level.root=INFO
logging.level.com.todolist=INFO
logging.level.org.hibernate.SQL=INFO
